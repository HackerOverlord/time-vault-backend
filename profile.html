<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Vault - Profile</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #4a9eff;
            --accent-secondary: #10b981;
            --danger-color: #ef4444;
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navigation Header */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(74, 158, 255, 0.2);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
        }

        .back-btn:hover {
            background: var(--accent-color);
            transform: translateY(-2px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 15px;
            border-radius: var(--border-radius);
            transition: var(--transition);
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        /* Profile Content */
        .profile-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin: 0 auto 20px;
            border: 4px solid var(--accent-color);
            box-shadow: 0 10px 30px rgba(74, 158, 255, 0.3);
            background-size: cover;
            background-position: center;
        }

        .profile-name {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .profile-email {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Form Styling */
        .form-section {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: var(--border-radius);
            margin-bottom: 30px;
            border: 1px solid rgba(74, 158, 255, 0.2);
        }

        .form-section h3 {
            margin-bottom: 20px;
            color: var(--accent-color);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-primary);
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(74, 158, 255, 0.2);
        }

        .form-textarea {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-primary);
            border: 1px solid rgba(74, 158, 255, 0.3);
            border-radius: var(--border-radius);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
            min-height: 100px;
            resize: vertical;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(74, 158, 255, 0.2);
        }

        .file-upload {
            margin-top: 10px;
        }

        .file-upload-label {
            display: inline-block;
            padding: 10px 20px;
            background: var(--bg-tertiary);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
        }

        .file-upload-label:hover {
            background: var(--accent-color);
        }

        .file-upload input {
            display: none;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(74, 158, 255, 0.3);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--accent-secondary);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* Logout Section */
        .logout-section {
            text-align: center;
            padding: 30px;
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .logout-section h3 {
            color: var(--danger-color);
            margin-bottom: 15px;
        }

        .logout-section p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation Header -->
        <div class="nav-header">
            <div class="nav-left">
                <button class="back-btn" onclick="goBack()">← Back</button>
                <div class="logo">⭐🔐 Time Vault</div>
            </div>
            <div class="nav-menu">
                <a href="#" class="nav-link" onclick="goToMain()">Home</a>
                <a href="#" class="nav-link" onclick="goToMain()">Time Capsules</a>
                <a href="#" class="nav-link" onclick="goToMain('family-tree')">Family Tree</a>
            </div>
        </div>

        <!-- Profile Content -->
        <div class="profile-content">
            <div class="profile-header">
                <div class="profile-avatar" id="profile-avatar-display">U</div>
                <h1 class="profile-name" id="profile-name-display">User Name</h1>
                <p class="profile-email" id="profile-email-display">user@example.com</p>
            </div>

            <!-- Profile Settings Form -->
            <div class="form-section">
                <h3>Profile Settings</h3>
                <form id="profile-form">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-input" id="user-name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="user-email" readonly>
                        <small style="color: var(--text-secondary); font-size: 0.8rem;">Email cannot be changed</small>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Profile Picture</label>
                        <div class="file-upload">
                            <input type="file" id="user-photo-file" accept="image/*" onchange="previewProfilePhoto(this)">
                            <label for="user-photo-file" class="file-upload-label">
                                📷 Choose Profile Picture
                            </label>
                        </div>
                        <div id="profile-photo-preview" style="margin-top: 15px; display: none;">
                            <img id="profile-photo-preview-img" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-color);">
                        </div>
                        <div style="margin-top: 10px;">
                            <label style="font-size: 0.8rem; color: var(--text-secondary);">Or enter photo URL:</label>
                            <input type="url" class="form-input" id="user-photo-url" placeholder="https://example.com/photo.jpg" style="margin-top: 5px;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Bio</label>
                        <textarea class="form-textarea" id="user-bio" placeholder="Tell us about yourself..." rows="4"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Theme</label>
                        <select class="form-input" id="user-theme">
                            <option value="dark">Dark Theme</option>
                            <option value="light">Light Theme</option>
                        </select>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">Reset</button>
                    </div>
                </form>
            </div>

            <!-- Logout Section -->
            <div class="logout-section">
                <h3>Logout</h3>
                <p>Are you sure you want to logout? You'll need to login again to access your account.</p>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <script>
        // User profile data
        let userProfile = {
            name: 'User',
            email: 'user@example.com',
            photo: null,
            bio: '',
            theme: 'dark'
        };

        // Load user profile from localStorage
        function loadUserProfile() {
            const savedProfile = localStorage.getItem('userProfile');
            if (savedProfile) {
                userProfile = JSON.parse(savedProfile);
                updateDisplay();
                populateForm();
            }
            
            // Set default avatar from localStorage if no profile photo
            const userName = localStorage.getItem('userName');
            const avatarDisplay = document.getElementById('profile-avatar-display');
            if (userName && !userProfile.photo) {
                avatarDisplay.textContent = userName.charAt(0).toUpperCase();
            }
        }

        // Update display elements
        function updateDisplay() {
            document.getElementById('profile-name-display').textContent = userProfile.name;
            document.getElementById('profile-email-display').textContent = userProfile.email;
            
            const avatarDisplay = document.getElementById('profile-avatar-display');
            if (userProfile.photo) {
                avatarDisplay.style.backgroundImage = `url(${userProfile.photo})`;
                avatarDisplay.textContent = '';
            } else {
                avatarDisplay.style.backgroundImage = '';
                avatarDisplay.textContent = userProfile.name.charAt(0).toUpperCase();
            }
        }

        // Populate form with current data
        function populateForm() {
            document.getElementById('user-name').value = userProfile.name;
            document.getElementById('user-email').value = userProfile.email;
            document.getElementById('user-bio').value = userProfile.bio || '';
            document.getElementById('user-theme').value = userProfile.theme || 'dark';
            document.getElementById('user-photo-url').value = userProfile.photo || '';
            
            if (userProfile.photo) {
                const preview = document.getElementById('profile-photo-preview');
                const previewImg = document.getElementById('profile-photo-preview-img');
                preview.style.display = 'block';
                previewImg.src = userProfile.photo;
            }
        }

        // Save user profile
        function saveUserProfile() {
            const name = document.getElementById('user-name').value;
            const photoUrl = document.getElementById('user-photo-url').value;
            const bio = document.getElementById('user-bio').value;
            const theme = document.getElementById('user-theme').value;

            userProfile.name = name;
            userProfile.photo = photoUrl || null;
            userProfile.bio = bio;
            userProfile.theme = theme;

            localStorage.setItem('userProfile', JSON.stringify(userProfile));
            updateDisplay();
            alert('Profile saved successfully!');
        }

        // Preview profile photo
        function previewProfilePhoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('profile-photo-preview');
                    const previewImg = document.getElementById('profile-photo-preview-img');
                    preview.style.display = 'block';
                    previewImg.src = e.target.result;
                    document.getElementById('user-photo-url').value = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Reset form
        function resetForm() {
            populateForm();
        }

        // Form submission
        document.getElementById('profile-form').addEventListener('submit', function(e) {
            e.preventDefault();
            saveUserProfile();
        });

        // Navigation functions
        function goBack() {
            window.location.href = '/app';
        }

        function goToMain(section) {
            window.location.href = section ? `/app/#${section}` : '/app';
        }

        // Logout function
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                // Clear session data
                localStorage.removeItem('userProfile');
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userName');
                // Redirect to login page
                window.location.href = '/';
            }
        }

        // Load profile on page load
        loadUserProfile();
    </script>
</body>
</html>
